<body>
<div class="grain-overlay"></div>

  <div class="container">
    <div class="gallery-page-grid" id="gallery-complete"></div>
  </div>

  <div id="imageModal" class="modal" onclick="closeModal()">
    <span class="modal-close">&times;</span>
    <img class="modal-content" id="modalImage">
  </div>

  <script>
    var galleryPage = 1;
    const GALLERY_PER_PAGE = 12;

    function renderGalleryGrid(galleryData, page) {
      if (typeof page === 'undefined') page = galleryPage;
      const container = document.getElementById('gallery-complete');

      if (!galleryData.length) {
        container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--text-muted);">Nenhum registro na galeria</p>';
        return;
      }

      const sorted = [...galleryData].sort((a, b) => new Date(b.date) - new Date(a.date));
      var totalPages = Math.ceil(sorted.length / GALLERY_PER_PAGE);
      if (page < 1) page = 1;
      if (page > totalPages) page = totalPages;
      galleryPage = page;

      var start = (page - 1) * GALLERY_PER_PAGE;
      var end = Math.min(start + GALLERY_PER_PAGE, sorted.length);
      var pageItems = sorted.slice(start, end);

      var html = pageItems.map((photo, idx) => renderGalleryCard(photo, idx)).join('');

      if (totalPages > 1) {
        html += '<div style="grid-column:1/-1;display:flex;justify-content:center;align-items:center;gap:8px;padding:12px 0;flex-wrap:wrap;font-family:inherit;font-weight:700;font-size:12px;">';
        html += '<button onclick="goToGalleryPage(' + (page - 1) + ')" style="padding:8px 16px;border-radius:6px;border:1px solid rgba(0,0,0,0.15);background:rgba(0,0,0,0.04);color:#1a1a1a;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;transition:all 0.2s ease;' + (page <= 1 ? 'opacity:0.3;cursor:default;' : '') + '" ' + (page <= 1 ? 'disabled' : '') + '>❮ Anterior</button>';
        html += '<div style="display:flex;gap:4px;flex-wrap:wrap;">';
        for (var i = 1; i <= totalPages; i++) {
          html += '<button onclick="goToGalleryPage(' + i + ')" style="padding:8px 12px;border-radius:6px;border:1px solid ' + (i === page ? '#1a1a1a' : 'rgba(0,0,0,0.15)') + ';background:' + (i === page ? 'rgba(0,0,0,0.1)' : 'rgba(0,0,0,0.04)') + ';color:#1a1a1a;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;transition:all 0.2s ease;min-width:38px;">' + i + '</button>';
        }
        html += '</div>';
        html += '<button onclick="goToGalleryPage(' + (page + 1) + ')" style="padding:8px 16px;border-radius:6px;border:1px solid rgba(0,0,0,0.15);background:rgba(0,0,0,0.04);color:#1a1a1a;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;transition:all 0.2s ease;' + (page >= totalPages ? 'opacity:0.3;cursor:default;' : '') + '" ' + (page >= totalPages ? 'disabled' : '') + '>Próxima ❯</button>';
        html += '</div>';
      }

      container.innerHTML = html;
      observeRevealElements();
    }

    function goToGalleryPage(page) {
      var localData = JSON.parse(localStorage.getItem('sinaloa_gallery') || '[]');
      var renderPage = function(data) {
        renderGalleryGrid(data, page);
      };
      var db = firebase.database();
      db.ref('sinaloa-data').once('value').then(function(snapshot) {
        var firebaseRoot = snapshot.val();
        var data = [];
        if (firebaseRoot && firebaseRoot.gallery) {
          var fd = firebaseRoot.gallery;
          data = Array.isArray(fd) ? fd : (fd && typeof fd === 'object' ? Object.values(fd) : []);
        }
        if (!data.length) data = localData;
        renderPage(data);
      }).catch(function() { renderPage(localData); });
    }

    function loadGalleryData() {
      const localData = JSON.parse(localStorage.getItem('sinaloa_gallery') || '[]');
      const db = firebase.database();
      db.ref('sinaloa-data').once('value')
        .then(snapshot => {
          const firebaseRoot = snapshot.val();
          let galleryData = [];
          if (firebaseRoot && firebaseRoot.gallery) {
            const firebaseData = firebaseRoot.gallery;
            if (Array.isArray(firebaseData)) {
              galleryData = firebaseData;
            } else if (firebaseData && typeof firebaseData === 'object') {
              galleryData = Object.values(firebaseData);
            }
          }
          if (!galleryData.length) {
            galleryData = localData;
          }
          localStorage.setItem('sinaloa_gallery', JSON.stringify(galleryData));
          renderGalleryGrid(galleryData);
        })
        .catch(error => {
          console.warn('⚠️ Erro ao carregar galeria do Firebase:', error);
          renderGalleryGrid(localData);
        });
    }

    window.addEventListener('load', loadGalleryData);

    function observeRevealElements() {
      const revealObserver = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
      }, { threshold: 0.1 });
      document.querySelectorAll('.gallery-card.reveal').forEach(el => {
        revealObserver.observe(el);
        const rect = el.getBoundingClientRect();
        if (rect.top < window.innerHeight && rect.bottom > 0) el.classList.add('visible');
      });
    }
(function(){var c=document.createElement('canvas');c.width=256;c.height=256;var x=c.getContext('2d');var d=x.createImageData(256,256);var a=d.data;for(var i=0;i<a.length;i+=4){var v=Math.random()*255|0;a[i]=v;a[i+1]=v;a[i+2]=v;a[i+3]=255}x.putImageData(d,0,0);var el=document.querySelector('.grain-overlay');if(el)el.style.backgroundImage='url('+c.toDataURL('image/png')+')'})();
  </script>
