<section id="negocios">
  <div class="container">
    <div class="reveal">
      <div class="section-header">
        <div class="section-title-wrapper">
          <div class="section-icon">
            <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
            </svg>
          </div>
          <div>
            <div class="section-title">Negócios</div>
            <div class="section-sub">Fabricação e venda de munições</div>
          </div>
        </div>
      </div>
    </div>

    <div class="negocios-card-locked" id="negocios-locked-card">
      <div class="negocios-blurred-content">
        <table class="negocios-table">
          <thead>
            <tr>
              <th>Tipo</th>
              <th>Quantidade</th>
              <th>Cliente</th>
              <th>Valor</th>
              <th>Valor Total</th>
            </tr>
          </thead>
          <tbody id="negocios-blurred-rows"></tbody>
        </table>
      </div>
      <div class="negocios-lock-overlay">
        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" style="width:28px;height:28px;margin-bottom:8px;opacity:0.6;">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
        <div style="font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:3px;">Visualização restrita</div>
        <div style="font-size:11px;color:var(--text-muted);max-width:260px;margin-bottom:14px;">Os dados de vendas estão protegidos. Digite a senha para liberar.</div>
        <button class="btn btn-primary" onclick="openNegociosAuth()" style="width:100%;max-width:220px;padding:10px 20px;font-size:12px;">LIBERAR VISUALIZAÇÃO</button>
      </div>
    </div>
  </div>
</section>
